name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read

env:
  AWS_REGION: us-east-1
  SITE_BUCKET: stock-movers-site-393818036549

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run ingest logic tests
        run: python src/ingest/test_handler.py

  # Infra is applied locally via `terraform apply` (state is local; see README).
  # CI validates formatting/config so broken IaC can't merge silently.
  validate-infra:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform validate
        working-directory: infra
        run: |
          terraform init -backend=false -input=false
          terraform validate

  deploy-frontend:
    needs: [test, validate-infra]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Build
        working-directory: frontend
        run: |
          npm ci
          npm run build
      - name: Upload to S3
        run: aws s3 sync frontend/dist "s3://$SITE_BUCKET" --delete
