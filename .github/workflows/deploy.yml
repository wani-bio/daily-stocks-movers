name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read

env:
  AWS_REGION: us-east-1
  SITE_BUCKET: stock-movers-site-393818036549

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run ingest logic tests
        run: python src/ingest/test_handler.py
      - name: Run api logic tests
        run: python src/api/test_handler.py

  # State lives in S3, so CI can apply infrastructure changes directly.
  deploy-infra:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Terraform apply
        working-directory: infra
        env:
          TF_VAR_massive_api_key: ${{ secrets.MASSIVE_API_KEY }}
          TF_VAR_gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          TF_VAR_alert_email: ${{ secrets.ALERT_EMAIL }}
        run: |
          terraform init -input=false
          terraform validate
          terraform apply -auto-approve -input=false

  deploy-frontend:
    needs: deploy-infra
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Build
        working-directory: frontend
        run: |
          npm ci
          npm run build
      - name: Upload to S3
        run: aws s3 sync frontend/dist "s3://$SITE_BUCKET" --delete
